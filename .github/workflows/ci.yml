name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  release:
    name: release (gcc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build
      - name: Test
        run: make test

  sanitizers:
    name: ASan + UBSan (gcc)
    runs-on: ubuntu-latest
    env:
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      ASAN_OPTIONS: detect_leaks=1
    steps:
      - uses: actions/checkout@v4
      - name: Build with sanitizers
        run: make debug
      - name: Test
        run: make test

  clang:
    name: release (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build CC=clang
      - name: Test
        run: make test
